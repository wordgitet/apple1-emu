# Apple-1 emulator configuration (see documentation/usage.md)
# Headless (-H) and debugger (-g) are CLI-only, not set here.

rom = wozmon.bin
ram_kb = 16
load = myprog.bin @ 0300
wozmon_txt = dump.txt
flat_bin = test.bin
aci_rom = aci_rom.bin
tape_in = tape.wav
tape_out = out.wav
krusader = krusader.bin
baud = 1200

speed_cap = yes
flat_bus = yes
throttle_pia = yes
dram_refresh = yes
keyboard_bounce = no
randomize_ram = yes
trace = no
